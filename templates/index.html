<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự đoán điểm cuối kỳ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            background: white;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            border-radius: 5px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }
        input[type="file"], input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 3px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
        }
        button:hover {
            background: #0056b3;
        }
        .info-box {
            background: #e7f3ff;
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #007bff;
            display: none;
        }
        .result-box {
            background: #d4edda;
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #28a745;
            display: none;
        }
        .error-box {
            background: #f8d7da;
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #dc3545;
            display: none;
            color: #721c24;
        }
        .divider {
            border-top: 1px solid #ddd;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dự đoán điểm cuối kỳ</h1>
        
        <div class="form-group">
            <label for="file">Chọn file Excel:</label>
            <input type="file" id="file" accept=".xlsx" required>
            <button onclick="uploadFile()">Tải lên & Huấn luyện</button>
        </div>
        
        <div class="error-box" id="errorBox"></div>
        <div class="info-box" id="infoBox"></div>
        
        <div class="divider" id="divider" style="display: none;"></div>
        
        <div class="form-group" id="predictSection" style="display: none;">
            <label for="midterm">Điểm giữa kỳ:</label>
            <input type="number" id="midterm" min="0" max="10" step="0.1" placeholder="0-10">
            <button onclick="predict()">Dự đoán</button>
        </div>
        
        <div class="result-box" id="resultBox"></div>
    </div>

    <script>
        function uploadFile() {
            const file = document.getElementById('file').files[0];
            if (!file) {
                showError('Chọn file trước');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            fetch('/upload', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        showInfo(data.info);
                        document.getElementById('predictSection').style.display = 'block';
                        document.getElementById('divider').style.display = 'block';
                    } else {
                        showError(data.error);
                    }
                })
                .catch(e => showError('Lỗi: ' + e));
        }
        
        function predict() {
            const midterm = parseFloat(document.getElementById('midterm').value);
            if (isNaN(midterm) || midterm < 0 || midterm > 10) {
                showError('Nhập điểm từ 0-10');
                return;
            }
            
            fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({midterm: midterm})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showResult(data);
                } else {
                    showError(data.error);
                }
            })
            .catch(e => showError('Lỗi: ' + e));
        }
        
        function showError(msg) {
            document.getElementById('errorBox').innerText = msg;
            document.getElementById('errorBox').style.display = 'block';
            document.getElementById('infoBox').style.display = 'none';
            document.getElementById('resultBox').style.display = 'none';
        }
        
        function showInfo(info) {
            const html = `
                Huấn luyện thành công<br>
                Mẫu: ${info.total_samples} (train: ${info.train_samples}, test: ${info.test_samples})<br>
                Độ chính xác: ${(info.train_score * 100).toFixed(2)}% / ${(info.test_score * 100).toFixed(2)}%<br>
                MSE: ${info.train_mse.toFixed(4)} / ${info.test_mse.toFixed(4)}
            `;
            document.getElementById('infoBox').innerHTML = html;
            document.getElementById('infoBox').style.display = 'block';
            document.getElementById('errorBox').style.display = 'none';
        }
        
        function showResult(data) {
            const html = `
                Điểm giữa kỳ: ${data.midterm.toFixed(1)}<br>
                Dự đoán: <strong>${data.predicted.toFixed(2)}/10</strong>
            `;
            document.getElementById('resultBox').innerHTML = html;
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('errorBox').style.display = 'none';
        }
    </script>
</body>
</html>
